name: Update README Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  push:
    branches: [main]
  workflow_dispatch: {}      # manual trigger from Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch GitHub Stats card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=ujjwalg2611&show_icons=true&theme=dark&hide_border=false&count_private=true&include_all_commits=true" \
            -o profile/stats.svg

      - name: Fetch Top Languages card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=ujjwalg2611&theme=dark&hide_border=false&layout=compact&count_private=true&langs_count=8" \
            -o profile/top-langs.svg

      - name: Fetch Streak Stats card
        run: |
          curl -s "https://streak-stats.demolab.com/?user=ujjwalg2611&theme=dark&hide_border=false" \
            -o profile/streak.svg

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet || git commit -m "chore: update stats cards [skip ci]"
          git push
