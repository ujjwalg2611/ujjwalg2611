name: Update README Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  push:
    branches: [main]
  workflow_dispatch: {}      # manual trigger from Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch GitHub Stats card
        run: |
          curl -s "https://github-stats-extended.vercel.app/api?username=ujjwalg2611&show_icons=true&theme=dark&rank_icon=github&include_all_commits=true" \
            -o /tmp/stats.svg
          if head -c 100 /tmp/stats.svg | grep -q "<svg"; then
            cp /tmp/stats.svg profile/stats.svg
          else
            echo "::warning::GitHub Stats card fetch did not return an SVG (upstream likely paused/rate-limited) — keeping previous file"
          fi

      - name: Fetch Top Languages card
        run: |
          curl -s "https://github-stats-extended.vercel.app/api/top-langs?username=ujjwalg2611&theme=dark&hide_border=false&layout=compact&count_private=true&langs_count=6" \
            -o /tmp/top-langs.svg
          if head -c 100 /tmp/top-langs.svg | grep -q "<svg"; then
            cp /tmp/top-langs.svg profile/top-langs.svg
          else
            echo "::warning::Top Languages card fetch did not return an SVG (upstream likely paused/rate-limited) — keeping previous file"
          fi

      - name: Fetch Streak Stats card
        run: |
          curl -s "https://streak-stats.demolab.com/?user=ujjwalg2611&theme=dark&hide_border=false" \
            -o /tmp/streak.svg
          if head -c 100 /tmp/streak.svg | grep -q "<svg"; then
            cp /tmp/streak.svg profile/streak.svg
          else
            echo "::warning::Streak Stats card fetch did not return an SVG — keeping previous file"
          fi

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet || git commit -m "chore: update stats cards [skip ci]"
          git push
